name: ticket-tix
version: "3.8"

services:
  # --- 1. DATABASES ---

  postgres:
    image: postgres:15-alpine
    container_name: ticket-tix-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticket_tix_db
    ports:
      - "5433:5432"
    volumes:
      - ticket-tix-postgres:/var/lib/postgresql/data
    networks:
      - ticket-tix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ticket_tix_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: ticket-tix-elastic
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ticket-tix-elastic:/usr/share/elasticsearch/data
    networks:
      - ticket-tix_net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # --- 2. STORAGE ---

  minio:
    image: minio/minio:latest
    container_name: ticket-tix-minio
    hostname: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - ticket-tix-minio:/data
    networks:
      - ticket-tix_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  init-minio:
    image: minio/mc:latest
    container_name: ticket-tix-init-minio
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - ticket-tix_net
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set local http://minio:9000 minioadmin minioadmin123
      mc mb --ignore-existing local/ticket-bucket
      mc anonymous set download local/ticket-bucket
      echo 'Bucket ticket-bucket is ready.'
      "

  redis:
    image: redis:7-alpine
    container_name: ticket-tix-redis
    hostname: redis
    ports:
      - "6379:6379"
    networks:
      - ticket-tix_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- 3. KAFKA (FIXED KRaft SETUP) ---
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: ticket_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - ticket-tix-kafka-data:/bitnami/kafka
    networks:
      - ticket-tix_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ticket_kafka_ui
    ports:
      - "8088:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: ticket_tix_cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_REQUEST_TIMEOUT_MS: "60000"
      KAFKA_CLUSTERS_0_PROPERTIES_DEFAULT_API_TIMEOUT_MS: "60000"

      LOGGING_LEVEL_com.provectus.kafka.ui.service: DEBUG
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ticket-tix_net
    restart: on-failure

  init-kafka:
    image: bitnamilegacy/kafka:latest
    container_name: ticket_init_kafka
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ticket-tix_net
    command: >
      /bin/sh -c "
      echo 'Waiting for Kafka...' &&
      until /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do sleep 2; done &&
      echo 'Creating topics...' &&
      /opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists --topic booking.created --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 &&
      /opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists --topic booking.created.dlq --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
      echo 'SUCCESS: Topics created:' &&
      /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
      "

  # --- 4. OTHER SERVICES ---

  mongodb:
    image: mongo:6.0
    container_name: ticket-tix-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    networks:
      - ticket-tix_net
    volumes:
      - ticket-tix-mongodb:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ticket-tix_net:
    driver: bridge

volumes:
  ticket-tix-postgres:
  ticket-tix-elastic:
  ticket-tix-minio:
  ticket-tix-redis:
  ticket-tix-kafka-data:
  ticket-tix-mongodb: